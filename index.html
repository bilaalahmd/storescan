<!DOCTYPE html>
<html lang="en">    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>

            :root {
                --bg:      #0a0a0a;
                --surface: #1a1a1a;
                --accent:  #4ade80;
                --text:    #f0f0f0;
                --muted:   #777777;
                --border:  #2a2a2a;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                max-width: 420px;
                margin: 0 auto;
                min-height: 100vh;
            }

            div[id^="screen-"] {
            padding: 52px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        h1 {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
        }

        /* Buttons */
        button {
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            transition: opacity 0.1s;
        }
        button:active { opacity: 0.7; }

        #scan-btn {
            background: var(--accent);
            color: #0a0a0a;
            font-weight: 700;
            font-size: 15px;
            padding: 16px;
            border-radius: 14px;
        }

        #back-btn, #back-btn-2 {
            background: none;
            color: var(--accent);
            padding: 0;
            font-size: 15px;
            width: fit-content;
        }

        #add-item-btn {
            background: var(--accent);
            color: #0a0a0a;
            font-weight: 700;
        }

        /* Drawer cards */
        #drawers-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #drawers-list div {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 18px;
            cursor: pointer;
            transition: background 0.15s;
            border-left: 3px solid var(--accent);
        }
        #drawers-list div:active { background: #252525; }

        /* Items list */
        #items-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #items-list div {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 13px 16px;
            font-size: 14px;
        }

        /* Input */
        #item-input {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            width: 100%;
        }
        #item-input:focus { border-color: var(--accent); }
        #item-input::placeholder { color: var(--muted); }

        #items-list div button {
            float: right;
            background: none;
            color: var(--muted);
            font-size: 18px;
            padding: 0 4px;
            border-radius: 6px;
        }

        </style>

        <title>StoreScan</title>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    </head>

    <body>

        <div id ="screen-home">
            <h1>StoreScan</h1>
            <button id="scan-btn">Scan QR Code</button>
            <div id ="drawers-list"></div>
            <button id="add-location-btn">+ Add Location</button>
        </div>
    
        <div id ="screen-scanner" style="display:none">
            <button id="back-btn">Back</button>
            <h2>Scan QR Code</h2>
            <div id="qr-reader"></div>
        </div>
    
        <div id="screen-drawer" style="display:none">
            <button id="back-btn-2">Back</button>
            <h2 id="drawer-name"></h2>
            <div id="items-list"></div>
            <input id="item-input" placeholder="Add an item...">
            <button id="add-item-btn">Add Item</button>
        </div>
    
    
    
    
        <script>
            function showScreen(name) {
                document.getElementById('screen-home').style.display = 'none';
                document.getElementById('screen-scanner').style.display = 'none';
                document.getElementById('screen-drawer').style.display = 'none';
    
                document.getElementById('screen-' + name).style.display = 'block';
            }
    
            document.getElementById('scan-btn').onclick = function() {
                showScreen('scanner');
                startScanner();
            };
    
            document.getElementById('back-btn').onclick = function() {
                if (scanner && scannerRunning) {
                    scannerRunning = false;
                    scanner.stop().then(function() {
                        scanner = null;
                        document.getElementById('qr-reader').innerHTML = '';
                        showScreen('home');
                    }).catch(function() {
                        scanner = null;
                        document.getElementById('qr-reader').innerHTML = '';
                        showScreen('home');
                    });
                } else {
                    scanner = null;
                    document.getElementById('qr-reader').innerHTML = '';
                    showScreen('home');
                }
            };
    
            document.getElementById('back-btn-2').onclick = function() {
                showScreen('home');
            };

            let drawers = JSON.parse(localStorage.getItem('storescan')) || [
                { id: 'loc-1', name: 'Top Shelf', items: ['USB Cable', 'Batteries']},
                { id: 'loc-2', name: 'Desk Drawer', items: ['Pens', 'Notepad']},
                { id: 'loc-3', name: 'Wardrobe Floor', items: ['Gym Shoes']},
            ];

            function saveData() {
                localStorage.setItem('storescan', JSON.stringify(drawers));
            }

            function renderHome() {
                const list = document.getElementById('drawers-list');
                list.innerHTML = '';

                drawers.forEach(function(drawer, index) {
                    const card = document.createElement('div');
                    card.textContent = drawer.name + ' - ' + drawer.items.length + ' items';
                    const idLabel = document.createElement('p');
                    idLabel.textContent = 'ID: ' + drawer.id;
                    idLabel.style.cssText = 'font-size:11px; color:#777; margin-top:4px;';
                    card.appendChild(idLabel);
                    card.onclick = function() { openDrawer(drawer.id); };
                    
                    const deleteBtn = document.createElement('button');
                    deleteBtn.textContent = 'x';
                    deleteBtn.style.cssText = 'float:right; background:none; color:#777; font-size:18px; padding:0 4px;';
                    deleteBtn.onclick = function(e) {
                        e.stopPropagation();
                        const confirm = window.confirm('Delete ' + drawer.name + '?');
                        if (!confirm) return;
                        drawers.splice(index, 1);
                        saveData();
                        renderHome();
                    };

                    card.appendChild(deleteBtn);
                    list.appendChild(card);
                });
            }

            renderHome();

            let currentId = null;

            function openDrawer(id) {
            currentId = id;
            const drawer = drawers.find(function(d) { return d.id === id; });

            document.getElementById('drawer-name').textContent = drawer.name;
            renderItems(drawer);
            showScreen('drawer');
            }

            function renderItems(drawer) {
            const list = document.getElementById('items-list');
            list.innerHTML = '';

            drawer.items.forEach(function(item, index) {
                const row = document.createElement('div');
                row.textContent = item;

                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = 'x';
                deleteBtn.onclick = function() {
                    drawer.items.splice(index, 1);
                    saveData();
                    renderItems(drawer);
                    renderHome();
                }
                
                row.appendChild(deleteBtn);
                list.appendChild(row);
            });
            }

            document.getElementById('add-item-btn').onclick = function() {
            const input = document.getElementById('item-input');
            const name = input.value.trim();
            if (!name) return;

            const drawer = drawers.find(function(d) { return d.id === currentId; });
            drawer.items.push(name);
            input.value = '';
            saveData();
            renderItems(drawer);
            renderHome();

            };

            let scanner = null;
            let scannerRunning = false;

            function startScanner() {
                document.getElementById('qr-reader').innerHTML = '';
                scanner = new Html5Qrcode('qr-reader');
                scanner.start(
                    { facingMode: 'environment' },
                    {fps :10, qrbox: 220},
                    function(decoded) {
                        if (scannerRunning) {
                            scannerRunning = false;
                            scanner.stop().then(function() {
                                scanner = null;
                                openDrawer(decoded);
                            });
                        }
                    },
                    function() {}
                ).then(function() {
                    scannerRunning = true;
                }).catch(function() {
                    scannerRunning = false;
                    scanner = null;
                });
            }

            function stopScanner() {
                if (scanner) {
                    scanner.stop().then(function() {
                        scanner = null;
                        showScreen('home');
                    }).catch(function() {
                        scanner = null;
                        showScreen('home');
                    });
                } else {
                    showScreen('home');
                }
            };
            
            document.getElementById('add-location-btn').onclick = function() {
                const name = prompt('Enter location name:');
                if (!name) return;

                const id = prompt('Enter location ID for QR code (must be unique):');
                if (!id) return;

                drawers.push({ id: id, name: name, items: [] });
                saveData();
                renderHome();
            };

        </script>

    </body>
</html>
